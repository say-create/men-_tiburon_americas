<!-- CARRITO -->

🛒 <span id="count">0</span>
</button>
</div>

<div id="overlay" class="overlay" onclick="closeCart()"></div>

<div id="cartPanel" class="fixed bottom-0 left-0 right-0 bg-white p-4 hidden z-50 text-black">

</div>

<div id="cartItems"></div>
<p id="total"></p>

<input id="cambio" placeholder="¿Con cuánto pagarás?" class="w-full border mt-2">

<select id="metodoPago" class="w-full border mt-2">
<option>Efectivo</option>
<option>Transferencia</option>
</select>

<button onclick="sendWhatsApp()" class="bg-green-400 w-full mt-2 text-white">Enviar pedido</button>
</div>

</div>

<!-- MODAL -->

<p id="modalDesc"></p>
<div id="extras"></div>

<button onclick="confirmAdd()" class="bg-blue-500 w-full mt-2 text-white">Agregar</button>

</div>
</div>

<div id="panel" class="hidden mt-4">

<input id="nombre" placeholder="Nombre" class="border p-2 w-full mt-2">
<input id="precio" placeholder="Precio" class="border p-2 w-full mt-2">
<input id="desc" placeholder="Descripción" class="border p-2 w-full mt-2">
<input id="imagen" placeholder="URL de imagen" class="border p-2 w-full mt-2">

<button onclick="closeAdmin()" class="bg-red-400 w-full mt-2 p-2 text-white">Salir</button>

let cart=[];
let selectedProduct=null;
let ubicacion="";
let extrasTemp = [];
// EXTRAS PANEL
function addExtra(){

let nombre = document.getElementById("extraNombre").value.trim();
let precio = parseFloat(document.getElementById("extraPrecio").value);

if(!nombre || isNaN(precio)){
alert("Completa bien el extra");
return;
}

extrasTemp.push({
name:nombre,
price:precio
});

document.getElementById("extraNombre").value="";
document.getElementById("extraPrecio").value="";

renderExtras();
}

function renderExtras(){
let html="";

extrasTemp.forEach((e,i)=>{
html+=`
<div style="display:flex;justify-content:space-between;margin-bottom:5px;">
<span>${e.name} +$${e.price}</span>
<button onclick="deleteExtra(${i})">❌</button>
</div>
`;
});

document.getElementById("listaExtras").innerHTML = html;
}

function deleteExtra(i){
extrasTemp.splice(i,1);
renderExtras();
}
// MENU
function enterMenu(){
home.style.display="none";
menu.classList.remove("hidden");
renderProducts();
}

// RENDER
function renderProducts(cat="all"){
let html="";
products.forEach((p,i)=>{
if((cat==="all"||p.cat===cat)&&p.active){
html+=`
<div class="glass p-4 rounded-xl shadow-lg border border-gray-200">
<img src="${p.img}" class="w-full h-32 object-cover rounded">
<h3 class="font-bold">${p.name}</h3>
<p>${p.desc}</p>
<p class="precio text-lg">$${p.price}</p>

<button onclick="openModal(${i})"
class="bg-blue-500 w-10 h-10 flex items-center justify-center rounded text-white text-xl mt-2">+</button>

</div>`;
}
});
document.getElementById("products").innerHTML = html;
}

// MODAL
function openModal(i){
selectedProduct=products[i];
modal.classList.remove("hidden");
modalName.innerText=selectedProduct.name;
modalDesc.innerText=selectedProduct.desc;

let html="";
selectedProduct.extras.forEach(e=>{
html+=`<label><input type="checkbox" data-price="${e.price}"> ${e.name} +$${e.price}</label><br>`;
});
extras.innerHTML=html;
}

function closeModal(){modal.classList.add("hidden");}

// AGREGAR
function confirmAdd(){
let total=selectedProduct.price;
document.querySelectorAll("#extras input").forEach(e=>{
if(e.checked) total+=parseInt(e.dataset.price);
});
cart.push({name:selectedProduct.name,price:total});
updateCart();
closeModal();
}

// CARRITO
function updateCart(){
let html="",total=0;
cart.forEach((p,i)=>{
html+=`${p.name} $${p.price} <button onclick="removeItem(${i})">❌</button><br>`;
total+=p.price;
});
cartItems.innerHTML=html;
document.getElementById("total").innerText="Total: $"+total;
document.getElementById("count").innerText=cart.length;
}

function removeItem(i){cart.splice(i,1);updateCart();}

function renderAdmin(){
let html="";
products.forEach((p,i)=>{
html+=`
<div style="margin-bottom:10px;border-bottom:1px solid gray;padding:5px;">
<strong>${p.name}</strong>

<div style="margin-top:5px;display:flex;gap:5px;">
<button onclick="deleteP(${i})">❌</button>

<button onclick="toggleP(${i})"
style="background:${p.active?'green':'gray'};color:white;padding:3px 8px;border-radius:20px;">
${p.active?'ON':'OFF'}
</button>

<button onclick="editP(${i})"
style="background:orange;color:white;padding:3px 8px;border-radius:5px;">
✏️
</button>
</div>
</div>`;
});
adminList.innerHTML=html;
}

function deleteP(i){products.splice(i,1);renderAdmin();renderProducts();}
function toggleP(i){products[i].active=!products[i].active;renderAdmin();renderProducts();}

function editP(i){
nombre.value=products[i].name;
precio.value=products[i].price;
desc.value=products[i].desc;
imagen.value = products[i].img;
extrasTemp=products[i].extras||[];
renderExtras();
}

function addProduct(){
products.push({
cat:document.getElementById("categoria").value,
name:nombre.value,
price:parseInt(precio.value),
desc:desc.value,
img: document.getElementById("imagen").value || "https://images.unsplash.com/photo-1504754524776-8f4f37790ca0",
extras:extrasTemp,
active:true
});

extrasTemp=[];
renderExtras();
renderProducts();
renderAdmin();
}
</script>
