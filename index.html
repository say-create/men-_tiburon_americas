let cart=[];
let selectedProduct=null;
let ubicacion="";
let extrasTemp = [];
// EXTRAS PANEL
function addExtra(){

let nombre = document.getElementById("extraNombre").value.trim();
let precio = parseFloat(document.getElementById("extraPrecio").value);

if(!nombre || isNaN(precio)){
alert("Completa bien el extra");
return;
}

extrasTemp.push({
name:nombre,
price:precio
});

document.getElementById("extraNombre").value="";
document.getElementById("extraPrecio").value="";

renderExtras();
}

function renderExtras(){
let html="";

extrasTemp.forEach((e,i)=>{
html+=`
<div style="display:flex;justify-content:space-between;margin-bottom:5px;">
<span>${e.name} +$${e.price}</span>
<button onclick="deleteExtra(${i})">❌</button>
</div>
`;
});

document.getElementById("listaExtras").innerHTML = html;
}

function deleteExtra(i){
extrasTemp.splice(i,1);
renderExtras();
}
// MENU
function enterMenu(){
document.getElementById("home").style.display="none";
document.getElementById("menu").classList.remove("hidden");
renderProducts();
}

// RENDER
function renderProducts(cat="all"){
let html="";

products.forEach((p,i)=>{
if((cat==="all"||p.cat===cat)&&p.active){

html+=`
<div class="glass p-4 rounded-xl shadow-lg border border-gray-200 flex flex-col">

${p.img && p.img !== "" 
  ? `<img src="${p.img}" class="w-full h-28 object-cover rounded mb-2">`
  : ``
}

  <h3 class="font-bold text-sm line-clamp-2">${p.name}</h3>

  <p class="text-xs text-gray-600 line-clamp-2">${p.desc || ""}</p>

  <div class="mt-auto">
    <p class="precio text-lg">$${p.price}</p>

    <button onclick="openModal(${i})"
    class="bg-blue-500 w-10 h-10 flex items-center justify-center rounded text-white text-xl mt-2">+</button>
  </div>

</div>
`;

}
});

document.getElementById("products").innerHTML = html;
}

// MODAL
function openModal(i){
selectedProduct=products[i];
modal.classList.remove("hidden");
modalName.innerText=selectedProduct.name;
modalDesc.innerText=selectedProduct.desc;

let html="";
selectedProduct.extras.forEach(e=>{
html+=`<label><input type="checkbox" data-price="${e.price}"> ${e.name} +$${e.price}</label><br>`;
});
extras.innerHTML=html;
}

function closeModal(){modal.classList.add("hidden");}

// AGREGAR
function confirmAdd(){
let total=selectedProduct.price;
document.querySelectorAll("#extras input").forEach(e=>{
if(e.checked) total+=parseInt(e.dataset.price);
});
cart.push({name:selectedProduct.name,price:total});
updateCart();
closeModal();
}

// CARRITO
function updateCart(){
let html="",total=0;
cart.forEach((p,i)=>{
html+=`${p.name} $${p.price} <button onclick="removeItem(${i})">❌</button><br>`;
total+=p.price;
});
cartItems.innerHTML=html;
document.getElementById("total").innerText="Total: $"+total;
document.getElementById("count").innerText=cart.length;
}

function removeItem(i){cart.splice(i,1);updateCart();}
function openCart(){cartPanel.classList.remove("hidden");overlay.style.display="block";}
function closeCart(){cartPanel.classList.add("hidden");overlay.style.display="none";}

// GEO
function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
ubicacion=`https://maps.google.com?q=${pos.coords.latitude},${pos.coords.longitude}`;
});
}

// WHATS
function sendWhatsApp(){
let msg="Pedido:%0A";
let total=0;

cart.forEach(p=>{
msg+=`${p.name} $${p.price}%0A`;
total+=p.price;
});

let pago=parseFloat(document.getElementById("cambio").value)||0;
let cambioFinal=pago-total;

msg+=`Total: $${total}%0A`;
msg+=`Pagará con: $${pago}%0A`;
msg+=`Cambio: $${cambioFinal}%0A`;
msg+=`Método: ${metodoPago.value}%0A`;
msg+=`Ubicación: ${ubicacion}%0A`;
msg+=`Dirección: ${direccion.value}`;

window.open("https://wa.me/5215550572742?text="+msg);
}

// INSTALL
installBtn.onclick=()=>{
alert("📲 Agrégame a tu pantalla de inicio\nCompartir → Agregar a pantalla de inicio");
};
function showAdmin(){admin.classList.remove("hidden");}
function closeAdmin(){admin.classList.add("hidden");}

function login(){
if(pass.value==="1234"){
panel.classList.remove("hidden");
renderAdmin();
}
}

function renderAdmin(){
let html="";
products.forEach((p,i)=>{
html+=`
<div style="margin-bottom:10px;border-bottom:1px solid gray;padding:5px;">
<strong>${p.name}</strong>

<div style="margin-top:5px;display:flex;gap:5px;">
<button onclick="deleteP(${i})">❌</button>

<button onclick="toggleP(${i})"
style="background:${p.active?'green':'gray'};color:white;padding:3px 8px;border-radius:20px;">
${p.active?'ON':'OFF'}
</button>

<button onclick="editP(${i})"
style="background:orange;color:white;padding:3px 8px;border-radius:5px;">
✏️
</button>
</div>
</div>`;
});
adminList.innerHTML=html;
}

function deleteP(i){products.splice(i,1);renderAdmin();renderProducts();}
function toggleP(i){products[i].active=!products[i].active;renderAdmin();renderProducts();}

function editP(i){
nombre.value=products[i].name;
precio.value=products[i].price;
desc.value=products[i].desc;
imagen.value = products[i].img;
extrasTemp=products[i].extras||[];
renderExtras();
}

function addProduct(){
products.push({
cat:document.getElementById("categoria").value,
name:nombre.value,
price:parseInt(precio.value),
desc:desc.value,
img: document.getElementById("imagen").value || "https://images.unsplash.com/photo-1504754524776-8f4f37790ca0",
extras:extrasTemp,
active:true
});

extrasTemp=[];
renderExtras();
renderProducts();
renderAdmin();
}
